; AudioLinkLight ESP32 — PlatformIO プロジェクト設定
; =====================================================
; 【使い方】
;   1. VS Code 下部の青いバーにある「env:xxxx」の部分をクリック
;   2. 書き込む対象に合わせて「master_4mb」か「slave_8mb」を選択
;   3. 「→ (Upload)」ボタンで書き込み

[platformio]
build_dir = C:\temp\pio_build_8mb_v2

; 共通設定（親機・子機どちらでも使う設定）
[env]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_speed = 2000000
lib_deps = fastled/FastLED @ ^3.9.0
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0

; =====================================================
; 【親機用】 (USB接続 / 4MB フラッシュモデル)
; =====================================================
[env:master_4mb]
; フラッシュサイズ明示（4MB）
board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
; 4MB フラッシュ用パーティションテーブル
board_build.partitions = default.csv

; =====================================================
; 【子機用】 (WiFi専用 / 8MB フラッシュモデル)
; =====================================================
[env:slave_8mb]
; フラッシュサイズ明示（8MB）
board_upload.flash_size = 8MB
board_build.flash_size  = 8MB
; 8MB フラッシュ用パーティションテーブル
board_build.partitions = default_8MB.csv
