; AudioLinkLight ESP32 — PlatformIO プロジェクト設定
; =====================================================
; 【使い方】
;   1. VS Code に PlatformIO IDE 拡張をインストール
;   2. このフォルダを PlatformIO プロジェクトとして開く
;   3. サイドバーのチェックマーク(Build) または pio run でビルド
;   4. 矢印アイコン(Upload) または pio run --target upload で書き込み

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 接続ポート固定（ESP32-S3 ネイティブUSB COM6）
upload_port   = COM6
monitor_port  = COM6

; シリアル速度（モニタ用）
monitor_speed = 921600

; フラッシュサイズ明示（実機は 4MB なので 4MB に設定）
board_upload.flash_size = 4MB
board_build.flash_size  = 4MB

; FastLED ライブラリ（PlatformIO Registry から自動インストール）
lib_deps =
    fastled/FastLED @ ^3.9.0

; ESP32-S3 USB-CDC シリアル有効化
; ARDUINO_USB_MODE=1 は JTAG モードで CDC と競合するため使わない
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0

; 4MB フラッシュ用パーティションテーブル
board_build.partitions = default.csv

; ボードのフラッシュ速度
upload_speed = 921600
